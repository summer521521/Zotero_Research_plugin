name: Plugin Check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - name: Check plugin structure
        run: .\scripts\check-plugin.ps1
      - name: Privacy scan
        run: .\scripts\check-repo-privacy.ps1
